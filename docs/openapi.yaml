openapi: 3.1.0
info:
  title: Duel Standby API
  version: 0.4.0
  description: Auth, dashboard, users, teams, tournaments, treasury, profile, and audit endpoints for DSWeb.
servers:
  - url: https://example.com
components:
  securitySchemes:
    authjsSessionCookie:
      type: apiKey
      in: cookie
      name: authjs.session-token
  schemas:
    UserStatus:
      type: string
      enum:
        - ACTIVE
        - BANNED
    UserRole:
      type: string
      enum:
        - USER
        - MEMBER
        - OFFICER
        - ADMIN
        - FOUNDER
    TeamStatusFilter:
      type: string
      enum:
        - ALL
        - ACTIVE
        - INACTIVE
    TournamentStatus:
      type: string
      enum:
        - OPEN
        - ONGOING
        - COMPLETED
        - CANCELLED
    TournamentForfeitMode:
      type: string
      enum:
        - CHECKIN_ONLY
        - SCHEDULE_NO_SHOW
    TournamentParticipantStatus:
      type: string
      enum:
        - REGISTERED
        - CHECKED_IN
        - PLAYING
        - DISQUALIFIED
        - WAITLIST
paths:
  /api/auth/register:
    post:
      summary: Register a new public user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
                - confirmPassword
                - phoneWhatsapp
                - provinceCode
                - cityCode
                - sourceInfo
                - socialMedia
                - agreement
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                confirmPassword:
                  type: string
                phoneWhatsapp:
                  type: string
                provinceCode:
                  type: string
                cityCode:
                  type: string
                duelLinksGameId:
                  type: string
                  description: Formatted as XXX-XXX-XXX
                duelLinksIgn:
                  type: string
                duelLinksScreenshotUploadId:
                  type: string
                masterDuelGameId:
                  type: string
                  description: Formatted as XXX-XXX-XXX
                masterDuelIgn:
                  type: string
                masterDuelScreenshotUploadId:
                  type: string
                sourceInfo:
                  type: string
                socialMedia:
                  type: array
                  items:
                    type: string
                agreement:
                  type: boolean
      responses:
        "201":
          description: Registration created
  /api/auth/finalize:
    get:
      summary: Redirect browser to the safe Auth.js finalization page
      responses:
        "302":
          description: Redirect to `/oauth-finalize` without performing login side effects
    post:
      summary: Finalize Auth.js session for client-side login state and audit
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  enum:
                    - credentials
                    - google
                redirect:
                  type: string
      responses:
        "200":
          description: Redirect target returned after Auth.js finalization
        "401":
          description: Auth.js session missing or invalid
  /api/auth/me:
    get:
      summary: Get authenticated user session or guest payload
      responses:
        "200":
          description: Session payload
  /api/public/members/distribution:
    get:
      summary: Get public guild member distribution map points
      responses:
        "200":
          description: Distribution points and summary stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum: [true]
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        username:
                          type: string
                        province:
                          type: string
                          nullable: true
                        city:
                          type: string
                          nullable: true
                        country:
                          type: string
                          nullable: true
                        latitude:
                          type: number
                        longitude:
                          type: number
                        memberCount:
                          type: integer
                          nullable: true
                      required:
                        - id
                        - username
                        - province
                        - city
                        - latitude
                        - longitude
                  stats:
                    type: object
                    properties:
                      totalMembers:
                        type: integer
                      topCities:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                            count:
                              type: integer
                          required:
                            - name
                            - count
                      topProvince:
                        type: object
                        nullable: true
                        properties:
                          name:
                            type: string
                          count:
                            type: integer
                        required:
                          - name
                          - count
                    required:
                      - totalMembers
                      - topCities
                      - topProvince
                required:
                  - success
                  - data
                  - stats
  /api/profile:
    put:
      summary: Update account identity and region fields for the current user
      security:
        - authjsSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - phoneWhatsapp
                - provinceCode
                - cityCode
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                phoneWhatsapp:
                  type: string
                provinceCode:
                  type: string
                cityCode:
                  type: string
      responses:
        "200":
          description: Profile updated
        "400":
          description: Validation failed
        "401":
          description: Unauthorized
        "409":
          description: Username, email, or phone conflict
  /api/auth/oauth/finalize:
    get:
      summary: Compatibility alias to the Auth.js finalization redirect route
      responses:
        "302":
          description: Redirect to `/oauth-finalize` without performing login side effects
    post:
      summary: Compatibility alias to Auth.js finalize route
      responses:
        "200":
          description: Redirect target returned after finalization
  /api/auth/password/change:
    post:
      summary: Change password for authenticated user
      security:
        - authjsSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
                - confirmPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                confirmPassword:
                  type: string
      responses:
        "200":
          description: Password changed and sessions revoked
        "400":
          description: Validation failed or current password invalid
        "401":
          description: Unauthorized
  /api/upload/public:
    post:
      summary: Create temporary public upload for registration screenshot
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Temp upload created
        "429":
          description: Rate limit exceeded
  /api/upload/public/{id}:
    get:
      summary: Preview temporary public upload for the same client IP
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image preview
        "404":
          description: Upload not found or expired
  /api/regions/provinces:
    get:
      summary: List provinces for Indonesia region combobox
      responses:
        "200":
          description: Province list payload
  /api/regions/regencies:
    get:
      summary: List regencies or cities by province code
      parameters:
        - in: query
          name: provinceCode
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Regency list payload
        "400":
          description: provinceCode is required
  /api/dashboard/summary:
    get:
      summary: Fetch dashboard summary cards and lists
      security:
        - authjsSessionCookie: []
      responses:
        "200":
          description: Summary payload for the unified operations dashboard
        "403":
          description: Forbidden
  /api/users:
    get:
      summary: List users for dashboard management
      security:
        - authjsSessionCookie: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - ALL
              - ACTIVE
              - BANNED
        - in: query
          name: role
          schema:
            type: string
            enum:
              - ALL
              - USER
              - MEMBER
              - OFFICER
              - ADMIN
              - FOUNDER
        - in: query
          name: teamId
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: perPage
          schema:
            type: integer
      responses:
        "200":
          description: Paginated user list with team filter options
  /api/users/{id}:
    get:
      summary: Get a single managed user detail
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User detail payload including current team
        "404":
          description: Not found
  /api/users/{id}/status:
    put:
      summary: Update status, role, or team assignment for a managed user
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  $ref: "#/components/schemas/UserStatus"
                role:
                  $ref: "#/components/schemas/UserRole"
                teamId:
                  type:
                    - string
                    - "null"
                reason:
                  type: string
      responses:
        "200":
          description: User updated
        "400":
          description: Validation failed
        "403":
          description: Forbidden
        "404":
          description: Not found
  /api/teams:
    get:
      summary: List guild teams for dashboard management
      security:
        - authjsSessionCookie: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/TeamStatusFilter"
      responses:
        "200":
          description: Team list payload
        "403":
          description: Forbidden
    post:
      summary: Create a new guild team
      security:
        - authjsSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                slug:
                  type: string
                description:
                  type: string
                logoUrl:
                  type: string
                isActive:
                  type: boolean
      responses:
        "201":
          description: Team created
        "400":
          description: Validation failed
        "403":
          description: Forbidden
        "409":
          description: Slug already used
  /api/teams/{id}:
    get:
      summary: Get a guild team with roster summary
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team detail payload
        "403":
          description: Forbidden
        "404":
          description: Not found
    put:
      summary: Update a guild team
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                slug:
                  type: string
                description:
                  type: string
                logoUrl:
                  type: string
                isActive:
                  type: boolean
      responses:
        "200":
          description: Team updated
        "400":
          description: Validation failed
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Slug already used
    delete:
      summary: Delete an empty guild team
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team deleted
        "400":
          description: Team still has members
        "403":
          description: Forbidden
        "404":
          description: Not found
  /api/teams/{id}/roster:
    post:
      summary: Assign an eligible member to a team roster
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
      responses:
        "200":
          description: Member assigned to team roster
        "400":
          description: Validation failed or user not eligible
        "403":
          description: Forbidden
        "404":
          description: Team or user not found
        "409":
          description: User already belongs to another team
    delete:
      summary: Remove a member from a team roster
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
      responses:
        "200":
          description: Member removed from team roster
        "400":
          description: Validation failed or user not attached to this team
        "403":
          description: Forbidden
        "404":
          description: Team or user not found
  /api/treasury:
    get:
      summary: Fetch treasury transactions with summary
      security:
        - authjsSessionCookie: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: month
          schema:
            type: string
        - in: query
          name: year
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
            enum:
              - MASUK
              - KELUAR
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: method
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: userId
          schema:
            type: string
        - in: query
          name: includeSummary
          schema:
            type: integer
            enum: [0, 1]
        - in: query
          name: summaryYear
          schema:
            type: integer
        - in: query
          name: public
          schema:
            type: integer
            enum: [0, 1]
      responses:
        "200":
          description: Treasury list
    post:
      summary: Create treasury transaction
      security:
        - authjsSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - amount
                - category
                - method
                - status
                - description
              properties:
                type:
                  type: string
                  enum:
                    - MASUK
                    - KELUAR
                amount:
                  type: number
                category:
                  type: string
                method:
                  type: string
                status:
                  type: string
                description:
                  type: string
                counterparty:
                  type: string
                  nullable: true
                referenceCode:
                  type: string
                  nullable: true
                userId:
                  type:
                    - string
                    - "null"
      responses:
        "201":
          description: Treasury transaction created
        "403":
          description: Forbidden
  /api/treasury/export:
    get:
      summary: Export treasury transactions as CSV
      parameters:
        - in: query
          name: month
          schema:
            type: string
        - in: query
          name: year
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
            enum:
              - MASUK
              - KELUAR
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: method
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: public
          schema:
            type: integer
            enum: [0, 1]
      responses:
        "200":
          description: CSV export
  /api/tournaments:
    get:
      summary: List tournaments for public site and dashboard
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/TournamentStatus"
        - in: query
          name: gameType
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Tournament list payload
    post:
      summary: Create tournament
      security:
        - authjsSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - gameType
                - format
                - startAt
              properties:
                title:
                  type: string
                description:
                  type: string
                gameType:
                  type: string
                format:
                  type: string
                  enum:
                    - BO1
                    - BO3
                    - BO5
                structure:
                  type: string
                  enum:
                    - SINGLE_ELIM
                    - DOUBLE_ELIM
                    - SWISS
                startAt:
                  type: string
                  format: date-time
                registrationOpen:
                  type: string
                  format: date-time
                registrationClose:
                  type: string
                  format: date-time
                checkinRequired:
                  type: boolean
                timezone:
                  type: string
                  description: IANA timezone, default Asia/Jakarta
                forfeitEnabled:
                  type: boolean
                forfeitGraceMinutes:
                  type: integer
                  minimum: 1
                forfeitMode:
                  $ref: "#/components/schemas/TournamentForfeitMode"
                entryFee:
                  type: number
                prizePool:
                  type: number
                maxPlayers:
                  type: integer
                lineupSize:
                  type: integer
                  minimum: 1
                  nullable: true
                status:
                  $ref: "#/components/schemas/TournamentStatus"
      responses:
        "201":
          description: Tournament created
        "403":
          description: Forbidden
  /api/tournaments/{id}:
    get:
      summary: Get tournament detail including participants
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tournament detail payload
        "404":
          description: Not found
    put:
      summary: Update tournament
      security:
        - authjsSessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                gameType:
                  type: string
                format:
                  type: string
                  enum:
                    - BO1
                    - BO3
                    - BO5
                structure:
                  type: string
                  enum:
                    - SINGLE_ELIM
                    - DOUBLE_ELIM
                    - SWISS
                startAt:
                  type: string
                  format: date-time
                registrationOpen:
                  type: string
                  format: date-time
                registrationClose:
                  type: string
                  format: date-time
                checkinRequired:
                  type: boolean
                timezone:
                  type: string
                  description: IANA timezone
                forfeitEnabled:
                  type: boolean
                forfeitGraceMinutes:
                  type: integer
                  minimum: 1
                forfeitMode:
                  $ref: "#/components/schemas/TournamentForfeitMode"
                entryFee:
                  type: number
                prizePool:
                  type: number
                maxPlayers:
                  type: integer
                lineupSize:
                  type: integer
                  minimum: 1
                  nullable: true
                status:
                  $ref: "#/components/schemas/TournamentStatus"
      responses:
        "200":
          description: Tournament updated
        "403":
          description: Forbidden
    delete:
      summary: Delete tournament
      security:
        - authjsSessionCookie: []
      responses:
        "200":
          description: Tournament deleted
        "403":
          description: Forbidden
  /api/tournaments/{id}/register:
    post:
      summary: Register authenticated active user to a tournament
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Registration created or waitlisted
        "200":
          description: Registration already exists
        "400":
          description: Registration rejected
        "401":
          description: Unauthorized
        "404":
          description: Not found


  /api/tournaments/{id}/matches:
    get:
      summary: List matches for a tournament (admin/referee)
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: round
          schema:
            type: integer
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: includeReports
          schema:
            type: string
      responses:
        "200":
          description: Match list payload
        "403":
          description: Forbidden
  /api/tournaments/{id}/calendar:
    get:
      summary: Download tournament calendar (ICS)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: ICS calendar file
        "404":
          description: Tournament not found
  /api/tournaments/{id}/staff:
    get:
      summary: List tournament staff assignments
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Staff list payload
        "403":
          description: Forbidden
    post:
      summary: Assign tournament staff
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Staff assigned
        "403":
          description: Forbidden
        "409":
          description: Already assigned
  /api/tournaments/{id}/staff/{staffId}:
    delete:
      summary: Remove tournament staff
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: staffId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Staff removed
        "403":
          description: Forbidden
        "404":
          description: Not found
  /api/tournaments/{id}/staff/candidates:
      get:
        summary: List candidate users for tournament staff
        security:
          - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
        responses:
          "200":
            description: Candidate list payload
          "403":
            description: Forbidden
  /api/tournaments/{id}/participants/{participantId}/disqualify:
    post:
      summary: Disqualify tournament participant
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
        - in: path
          name: participantId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Participant disqualified
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Tournament closed
  /api/matches/{id}/report:
    post:
      summary: Report match result by participant
      security:
        - authjsSessionCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - scoreA
                - scoreB
                - winnerId
              properties:
                scoreA:
                  type: integer
                scoreB:
                  type: integer
                winnerId:
                  type: string
                evidenceUrls:
                  type: array
                  items:
                    type: string
