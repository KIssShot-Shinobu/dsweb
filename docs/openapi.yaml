openapi: 3.1.0
info:
  title: Duel Standby API
  version: 0.4.0
  description: Auth, dashboard, users, teams, tournaments, treasury, profile, and audit endpoints for DSWeb.
servers:
  - url: https://example.com
components:
  securitySchemes:
    dsAuthCookie:
      type: apiKey
      in: cookie
      name: ds_auth
  schemas:
    UserStatus:
      type: string
      enum:
        - ACTIVE
        - BANNED
    UserRole:
      type: string
      enum:
        - USER
        - MEMBER
        - OFFICER
        - ADMIN
        - FOUNDER
    TeamStatusFilter:
      type: string
      enum:
        - ALL
        - ACTIVE
        - INACTIVE
    TournamentStatus:
      type: string
      enum:
        - OPEN
        - ONGOING
        - COMPLETED
        - CANCELLED
paths:
  /api/auth/register:
    post:
      summary: Register a new public user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
                - confirmPassword
                - phoneWhatsapp
                - city
                - sourceInfo
                - socialMedia
                - agreement
              properties:
                username:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                confirmPassword:
                  type: string
                phoneWhatsapp:
                  type: string
                city:
                  type: string
                duelLinksScreenshotUploadId:
                  type: string
                masterDuelScreenshotUploadId:
                  type: string
                sourceInfo:
                  type: string
                socialMedia:
                  type: array
                  items:
                    type: string
                agreement:
                  type: boolean
      responses:
        "201":
          description: Registration created
  /api/auth/login:
    post:
      summary: Legacy credentials login endpoint for compatibility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - identifier
                - password
              properties:
                identifier:
                  type: string
                  description: Username atau email
                password:
                  type: string
                rememberMe:
                  type: boolean
      responses:
        "200":
          description: Login success
        "401":
          description: Invalid credentials
  /api/auth/finalize:
    get:
      summary: Finalize Auth.js session into internal auth cookies and redirect
      responses:
        "302":
          description: Redirect to dashboard or requested internal path after issuing auth cookies
    post:
      summary: Finalize Auth.js session into internal auth cookies for client-side login
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  enum:
                    - credentials
                    - google
                redirect:
                  type: string
      responses:
        "200":
          description: Internal cookies issued and redirect target returned
        "401":
          description: Auth.js session missing or invalid
  /api/auth/me:
    get:
      summary: Get authenticated user session or guest payload
      responses:
        "200":
          description: Session payload
  /api/auth/oauth/finalize:
    get:
      summary: Compatibility alias to Auth.js finalize route
      responses:
        "302":
          description: Redirect to dashboard or requested internal path after issuing auth cookies
    post:
      summary: Compatibility alias to Auth.js finalize route
      responses:
        "200":
          description: Internal cookies issued and redirect target returned
  /api/auth/refresh:
    post:
      summary: Rotate refresh token and refresh access cookie
      responses:
        "200":
          description: Token refreshed
  /api/auth/password/change:
    post:
      summary: Change password for authenticated user
      security:
        - dsAuthCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
                - confirmPassword
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                confirmPassword:
                  type: string
      responses:
        "200":
          description: Password changed and sessions revoked
        "400":
          description: Validation failed or current password invalid
        "401":
          description: Unauthorized
  /api/upload/public:
    post:
      summary: Create temporary public upload for registration screenshot
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Temp upload created
        "429":
          description: Rate limit exceeded
  /api/upload/public/{id}:
    get:
      summary: Preview temporary public upload for the same client IP
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image preview
        "404":
          description: Upload not found or expired
  /api/dashboard/summary:
    get:
      summary: Fetch dashboard summary cards and lists
      security:
        - dsAuthCookie: []
      responses:
        "200":
          description: Summary payload for the unified operations dashboard
        "403":
          description: Forbidden
  /api/users:
    get:
      summary: List users for dashboard management
      security:
        - dsAuthCookie: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - ALL
              - ACTIVE
              - BANNED
        - in: query
          name: role
          schema:
            type: string
            enum:
              - ALL
              - USER
              - MEMBER
              - OFFICER
              - ADMIN
              - FOUNDER
        - in: query
          name: teamId
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: perPage
          schema:
            type: integer
      responses:
        "200":
          description: Paginated user list with team filter options
  /api/users/{id}:
    get:
      summary: Get a single managed user detail
      security:
        - dsAuthCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User detail payload including current team
        "404":
          description: Not found
  /api/users/{id}/status:
    put:
      summary: Update status, role, or team assignment for a managed user
      security:
        - dsAuthCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  $ref: "#/components/schemas/UserStatus"
                role:
                  $ref: "#/components/schemas/UserRole"
                teamId:
                  type:
                    - string
                    - "null"
                reason:
                  type: string
      responses:
        "200":
          description: User updated
        "400":
          description: Validation failed
        "403":
          description: Forbidden
        "404":
          description: Not found
  /api/teams:
    get:
      summary: List guild teams for dashboard management
      security:
        - dsAuthCookie: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/TeamStatusFilter"
      responses:
        "200":
          description: Team list payload
        "403":
          description: Forbidden
    post:
      summary: Create a new guild team
      security:
        - dsAuthCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                slug:
                  type: string
                description:
                  type: string
                logoUrl:
                  type: string
                isActive:
                  type: boolean
      responses:
        "201":
          description: Team created
        "400":
          description: Validation failed
        "403":
          description: Forbidden
        "409":
          description: Slug already used
  /api/teams/{id}:
    get:
      summary: Get a guild team with roster summary
      security:
        - dsAuthCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team detail payload
        "403":
          description: Forbidden
        "404":
          description: Not found
    put:
      summary: Update a guild team
      security:
        - dsAuthCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - slug
              properties:
                name:
                  type: string
                slug:
                  type: string
                description:
                  type: string
                logoUrl:
                  type: string
                isActive:
                  type: boolean
      responses:
        "200":
          description: Team updated
        "400":
          description: Validation failed
        "403":
          description: Forbidden
        "404":
          description: Not found
        "409":
          description: Slug already used
    delete:
      summary: Delete an empty guild team
      security:
        - dsAuthCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team deleted
        "400":
          description: Team still has members
        "403":
          description: Forbidden
        "404":
          description: Not found
  /api/teams/{id}/roster:
    post:
      summary: Assign an eligible member to a team roster
      security:
        - dsAuthCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
      responses:
        "200":
          description: Member assigned to team roster
        "400":
          description: Validation failed or user not eligible
        "403":
          description: Forbidden
        "404":
          description: Team or user not found
        "409":
          description: User already belongs to another team
    delete:
      summary: Remove a member from a team roster
      security:
        - dsAuthCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
      responses:
        "200":
          description: Member removed from team roster
        "400":
          description: Validation failed or user not attached to this team
        "403":
          description: Forbidden
        "404":
          description: Team or user not found
  /api/treasury:
    get:
      summary: Fetch treasury transactions with summary
      security:
        - dsAuthCookie: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: month
          schema:
            type: integer
        - in: query
          name: year
          schema:
            type: integer
        - in: query
          name: type
          schema:
            type: string
            enum:
              - SEMUA
              - MASUK
              - KELUAR
        - in: query
          name: userId
          schema:
            type: string
      responses:
        "200":
          description: Treasury list
    post:
      summary: Create treasury transaction
      security:
        - dsAuthCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - amount
                - description
              properties:
                type:
                  type: string
                  enum:
                    - MASUK
                    - KELUAR
                amount:
                  type: number
                description:
                  type: string
                userId:
                  type:
                    - string
                    - "null"
      responses:
        "201":
          description: Treasury transaction created
        "403":
          description: Forbidden
  /api/tournaments:
    get:
      summary: List tournaments for public site and dashboard
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: status
          schema:
            $ref: "#/components/schemas/TournamentStatus"
        - in: query
          name: gameType
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Tournament list payload
    post:
      summary: Create tournament
      security:
        - dsAuthCookie: []
      responses:
        "201":
          description: Tournament created
        "403":
          description: Forbidden
  /api/tournaments/{id}:
    get:
      summary: Get tournament detail including participants
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tournament detail payload
        "404":
          description: Not found
    put:
      summary: Update tournament
      security:
        - dsAuthCookie: []
      responses:
        "200":
          description: Tournament updated
        "403":
          description: Forbidden
    delete:
      summary: Delete tournament
      security:
        - dsAuthCookie: []
      responses:
        "200":
          description: Tournament deleted
        "403":
          description: Forbidden
  /api/tournaments/{id}/register:
    post:
      summary: Register authenticated active user to a tournament
      security:
        - dsAuthCookie: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Registration success
        "400":
          description: Registration rejected
        "401":
          description: Unauthorized
        "404":
          description: Not found

